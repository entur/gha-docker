name: Entur/Docker/Resolve Image

on:
  workflow_call:
    inputs:
      image_name:
        description: "Image name to resolve. Defaults to the repository name."
        type: string
        default: "repo_name"
    outputs:
      image:
        description: "Resolved image name and tag (image_name:image_tag), empty if no image was built for the PR"
        value: ${{ jobs.resolve-image.outputs.image }}
      image_tag:
        description: "Resolved image tag, empty if no image was built for the PR"
        value: ${{ jobs.resolve-image.outputs.image_tag }}
      pr_number:
        description: "The PR number that was merged at the current commit"
        value: ${{ jobs.resolve-image.outputs.pr_number }}

jobs:
  resolve-image:
    name: Resolve Image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      image: ${{ steps.resolve.outputs.image }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve image from merged PR git tag
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          GHA_DOCKER_RESOLVE_IMAGE_NAME: ${{ inputs.image_name }}
        run: |
          # Determine image name (default to repo name)
          if [ "$GHA_DOCKER_RESOLVE_IMAGE_NAME" = "repo_name" ]; then
            GHA_DOCKER_RESOLVE_IMAGE_NAME="${GITHUB_REPOSITORY#*/}"
          fi

          # Find the PR that was merged at this commit
          PR_NUMBER=$(gh pr list --search "$GITHUB_SHA" --state merged --json number --jq '.[0].number')
          if [ -z "$PR_NUMBER" ]; then
            echo "::error::Could not find merged PR for commit $GITHUB_SHA"
            exit 1
          fi
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

          # Get the PR branch name and apply the same sanitisation as gha-docker push:
          # truncate to 43 chars, strip trailing -, lowercase, replace /.- with -
          BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName')
          BRANCH=${BRANCH:0:43}
          BRANCH=$(echo "$BRANCH" | sed s'/[-]$//')
          BRANCH=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | tr -d '[ÆØÅæøå]')
          BRANCH=${BRANCH//\//-}
          BRANCH=${BRANCH//./-}
          BRANCH=${BRANCH//!/-}

          # Find the most recent git tag for this branch (created by the docker push workflow).
          # Tags follow the pattern: {branch}.{YYYYMMDD}-SHA{short_sha}
          IMAGE_TAG=$(git tag -l "${BRANCH}.*" --sort=-creatordate | head -1)
          if [ -z "$IMAGE_TAG" ]; then
            echo "::warning::No git tag matching '${BRANCH}.*' (PR #${PR_NUMBER}) — no image was built for this PR, skipping deploy"
            exit 0
          fi

          echo "Resolved image: ${GHA_DOCKER_RESOLVE_IMAGE_NAME}:${IMAGE_TAG} (from PR #${PR_NUMBER})"
          echo "image=${GHA_DOCKER_RESOLVE_IMAGE_NAME}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
